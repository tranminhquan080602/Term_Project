<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Ubuntu:ital,wght@0,300;0,400;0,500;0,700;1,300;1,400;1,500;1,700&display=swap"
        rel="stylesheet">
    <link rel="stylesheet"
        href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0,0&icon_names=send" />
    <title>AI Chatbot</title>
    <link rel="stylesheet" href="style.css">

</head>

<body id ="body">
    <!--Nav Bar-->
    <nav class="navbar fixed-top bg-body-tertiary">
        <div class="container-fluid justify-content-center">
            <span class="navbar-brand mb-0 h1">AI Chatbot</span>
        </div>
    </nav>

    <!--Chat body-->
    <div id="chatBody" class="d-flex flex-column">
        <div class="d-flex justify-content-start">
            <div class="chatBubble aiMsg ms-4 p-4">
                Hi, how can I help you today?
            </div>
        </div>

        <!-- <div class="d-flex justify-content-end me-4 p-4">
            <div class="chatBubble userMsg me-4 p-4">
                ALALALLALA
            </div>
        </div> -->   
        
        <!--i actually created this before i came up with the final solution
        i don't need this or use this HTML, but when i deleted it, it broke my site and i can't tell why-->
        <!--Bot thinking tiny animation-->
        <div id="think" class = "justify-content-center mt-auto">
            <div class = "chatBubble p-3">
                Thinking...
            </div>
        </div>
    </div>

    <!--Input bar-->
    <div class="container-fluid fixed-bottom mb-4">
        <div class="input-group">
            <textarea id="userInput" class="form-control"></textarea>
            <button class="btn" type="button" id="sendBtn">
                <span class="icon material-symbols-outlined">
                    send
                </span>
            </button>
        </div>
    </div>

    <!--Empty message modal-->
    <div id="myModal"  class="modal" tabindex="-1">
            <div class="modal-dialog">
                <div class="modal-content">
                    <div class="modal-header">
                        <h5 class="modal-title">Error</h5>
                        <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
                    </div>
                    <div class="modal-body">
                        <p>User message can not be emptied. Please enter a message</p>
                    </div>
                    <div class="modal-footer">
                        <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Close</button>
                    </div>
                </div>
            </div>
    </div>

 
    <!-- Bundle -->
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.min.js"
        integrity="sha384-0pUGZvbkm6XF6gxjEnlmuGrJXVbNuzT9qBBavbLwCsOGabYfZo0T0to5eqruptLy"
        crossorigin="anonymous"></script>
    <script src="script.js"></script>
</body>

</html>
